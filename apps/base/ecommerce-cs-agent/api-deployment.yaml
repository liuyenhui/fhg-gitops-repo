apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-cs-agent-api
  labels:
    app.kubernetes.io/name: ecommerce-cs-agent-api
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ecommerce-cs-agent-api
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ecommerce-cs-agent-api
        app.kubernetes.io/component: api
    spec:
      imagePullSecrets:
        - name: ghcr-auth
      containers:
        - name: api
          image: tiangolo/uvicorn-gunicorn-fastapi:python3.11-slim
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
          args:
            - main:app
            - --host
            - 0.0.0.0
            - --port
            - "8080"
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: AGENT_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ecommerce-cs-agent-runtime
                  key: agent-api-token
            - name: LLM_PROVIDER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ecommerce-cs-agent-runtime
                  key: llm-provider-api-key
                  optional: true
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: ecommerce-postgres-auth
                  key: database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ecommerce-postgres-auth
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ecommerce-postgres-auth
                  key: password
            - name: S3_ENDPOINT
              value: http://minio:9000
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: ecommerce-minio-auth
                  key: bucket
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ecommerce-minio-auth
                  key: access-key
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ecommerce-minio-auth
                  key: secret-key
          volumeMounts:
            - name: api-source
              mountPath: /app/main.py
              subPath: main.py
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: api-source
          configMap:
            name: ecommerce-cs-agent-api-source

