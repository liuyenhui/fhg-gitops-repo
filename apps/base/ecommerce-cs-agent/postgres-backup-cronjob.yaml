apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  labels:
    app.kubernetes.io/name: ecommerce-postgres
    app.kubernetes.io/component: backup
spec:
  schedule: "17 18 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: ecommerce-postgres
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          initContainers:
            - name: copy-minio-client
              image: minio/minio:latest
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
                - cp /usr/bin/mc /tools/mc
              volumeMounts:
                - name: tools
                  mountPath: /tools
          containers:
            - name: pg-dump
              image: pgvector/pgvector:pg16
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
                - |
                  export PGPASSWORD="$POSTGRES_PASSWORD"
                  backup="cs-agent-${POSTGRES_DB}-$(date -u +%Y%m%dT%H%M%SZ).dump"
                  pg_dump -h postgres -U "$POSTGRES_USER" -d "$POSTGRES_DB" -Fc -f "/tmp/${backup}"
                  /tools/mc alias set minio "$S3_ENDPOINT" "$S3_ACCESS_KEY_ID" "$S3_SECRET_ACCESS_KEY"
                  /tools/mc mb --ignore-existing "minio/${S3_BUCKET}"
                  /tools/mc cp "/tmp/${backup}" "minio/${S3_BUCKET}/postgres/${backup}"
                  echo "uploaded minio/${S3_BUCKET}/postgres/${backup}"
              env:
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: ecommerce-postgres-auth
                      key: database
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: ecommerce-postgres-auth
                      key: username
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ecommerce-postgres-auth
                      key: password
                - name: S3_ENDPOINT
                  value: http://minio:9000
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: ecommerce-minio-auth
                      key: bucket
                - name: S3_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: ecommerce-minio-auth
                      key: access-key
                - name: S3_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: ecommerce-minio-auth
                      key: secret-key
              volumeMounts:
                - name: tools
                  mountPath: /tools
          volumes:
            - name: tools
              emptyDir: {}
