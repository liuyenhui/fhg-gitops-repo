apiVersion: apps/v1
kind: Deployment
metadata:
  name: bpg-frpc
  namespace: frp-system
  labels:
    app.kubernetes.io/name: bpg-frpc
    app.kubernetes.io/part-of: remote-access
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bpg-frpc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bpg-frpc
        app.kubernetes.io/part-of: remote-access
    spec:
      nodeSelector:
        kubernetes.io/hostname: agent-0
      containers:
        - name: frpc
          image: snowdreamtech/frpc:0.64.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              cat > /tmp/frpc.toml <<EOF
              serverAddr = "${FRP_SERVER_ADDR}"
              serverPort = 7000
              auth.method = "token"
              auth.token = "${FRP_TOKEN}"
              log.to = "console"
              log.level = "info"

              [[proxies]]
              name = "bpg-k3s-api"
              type = "tcp"
              localIP = "192.168.1.200"
              localPort = 6443
              remotePort = 6443

              [[proxies]]
              name = "cs-agent-dev-http"
              type = "http"
              customDomains = ["cs-agent-dev.fcihome.com", "api.ecommerce-cs-agent-dev.fcihome.com", "admin.ecommerce-cs-agent-dev.fcihome.com", "system-admin.ecommerce-cs-agent-dev.fcihome.com", "chat.fcihome.com", "feishu.fcihome.com", "account.fcihome.com"]
              localIP = "192.168.1.200"
              localPort = 80

              EOF
              exec /usr/bin/frpc -c /tmp/frpc.toml
          env:
            - name: FRP_SERVER_ADDR
              value: 47.113.204.168
            - name: FRP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: frpc-auth
                  key: token
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
        - name: frpc-ssh
          image: snowdreamtech/frpc:0.64.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              cat > /tmp/frpc-ssh.toml <<EOF
              serverAddr = "${FRP_SSH_SERVER_ADDR}"
              serverPort = 7000
              auth.method = "token"
              auth.token = "${FRP_SSH_TOKEN}"
              log.to = "console"
              log.level = "info"

              [[proxies]]
              name = "mac-intel-ssh"
              type = "tcpmux"
              multiplexer = "httpconnect"
              customDomains = ["mac-intel.ssh.fcihome.com"]
              localIP = "192.168.1.76"
              localPort = 22

              EOF
              exec /usr/bin/frpc -c /tmp/frpc-ssh.toml
          env:
            - name: FRP_SSH_SERVER_ADDR
              value: ssh.fcihome.com
            - name: FRP_SSH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: frpc-auth
                  key: cmdz-token
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
