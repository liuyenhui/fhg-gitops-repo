apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: fcihome-account
resources:
  - namespace.yaml
  - configmap.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: fcihome-identity
      app.kubernetes.io/managed-by: flux
