apiVersion: v1
kind: Service
metadata:
  name: feishu-bridge
spec:
  selector:
    app.kubernetes.io/name: feishu-bridge
  ports:
    - name: http
      port: 8788
      targetPort: http
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: feishu-bridge-data
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: feishu-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: feishu-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: feishu-bridge
    spec:
      imagePullSecrets:
        - name: aliyun-registry-auth
      containers:
        - name: bridge
          image: registry.cn-beijing.aliyuncs.com/threepeople/fcihome-chatwoot-feishu-bridge:20260621-customer-remark-ce575ea
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8788
          env:
            - name: PORT
              value: "8788"
            - name: BRIDGE_DATA_DIR
              value: /data
            - name: BRIDGE_PUBLIC_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: fcihome-customer-chat-config
                  key: BRIDGE_PUBLIC_BASE_URL
            - name: BRIDGE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: fcihome-customer-chat-runtime
                  key: BRIDGE_WEBHOOK_SECRET
            - name: FEISHU_APP_ID
              valueFrom:
                secretKeyRef:
                  name: fcihome-customer-chat-runtime
                  key: FEISHU_APP_ID
            - name: FEISHU_APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: fcihome-customer-chat-runtime
                  key: FEISHU_APP_SECRET
            - name: FEISHU_VERIFICATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: fcihome-customer-chat-runtime
                  key: FEISHU_VERIFICATION_TOKEN
            - name: FEISHU_ADMIN_OPEN_ID
              valueFrom:
                secretKeyRef:
                  name: fcihome-customer-chat-runtime
                  key: FEISHU_ADMIN_OPEN_ID
                  optional: true
            - name: FEISHU_ALLOW_FIRST_BIND
              valueFrom:
                configMapKeyRef:
                  name: fcihome-customer-chat-config
                  key: FEISHU_ALLOW_FIRST_BIND
            - name: CHATWOOT_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: fcihome-customer-chat-config
                  key: CHATWOOT_BASE_URL
            - name: CHATWOOT_ACCOUNT_ID
              valueFrom:
                configMapKeyRef:
                  name: fcihome-customer-chat-config
                  key: CHATWOOT_ACCOUNT_ID
            - name: CHATWOOT_INBOX_ID
              valueFrom:
                configMapKeyRef:
                  name: fcihome-customer-chat-config
                  key: CHATWOOT_INBOX_ID
            - name: CHATWOOT_API_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: fcihome-customer-chat-runtime
                  key: CHATWOOT_API_ACCESS_TOKEN
          volumeMounts:
            - name: bridge-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: bridge-data
          persistentVolumeClaim:
            claimName: feishu-bridge-data
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: feishu-bridge
spec:
  ingressClassName: traefik
  rules:
    - host: feishu.fcihome.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: feishu-bridge
                port:
                  name: http
