apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: fcihome-customer-chat
resources:
  - namespace.yaml
  - configmap.yaml
  - postgres.yaml
  - redis.yaml
  - chatwoot.yaml
  - bridge.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: fcihome-customer-chat
      app.kubernetes.io/managed-by: flux
