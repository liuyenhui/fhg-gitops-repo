apiVersion: v1
kind: Service
metadata:
  name: chatwoot-redis
spec:
  selector:
    app.kubernetes.io/name: chatwoot-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: chatwoot-redis
spec:
  serviceName: chatwoot-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chatwoot-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chatwoot-redis
    spec:
      containers:
        - name: redis
          image: docker.m.daocloud.io/library/redis:7-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - redis-server --appendonly yes --requirepass "$CHATWOOT_REDIS_PASSWORD"
          ports:
            - name: redis
              containerPort: 6379
          env:
            - name: CHATWOOT_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fcihome-customer-chat-runtime
                  key: CHATWOOT_REDIS_PASSWORD
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi
