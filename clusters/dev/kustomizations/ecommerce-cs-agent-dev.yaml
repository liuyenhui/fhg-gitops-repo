apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ecommerce-cs-agent-dev
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/overlays/dev/ecommerce-cs-agent
  prune: true
  wait: true
  timeout: 15m
  dependsOn:
    - name: infrastructure-config
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: ecommerce-cs-agent-api
      namespace: ecommerce-cs-agent-dev
    - apiVersion: apps/v1
      kind: StatefulSet
      name: postgres
      namespace: ecommerce-cs-agent-dev
    - apiVersion: apps/v1
      kind: StatefulSet
      name: minio
      namespace: ecommerce-cs-agent-dev
