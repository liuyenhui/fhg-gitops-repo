apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: fcihome-customer-chat
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/overlays/dev/fcihome-customer-chat
  prune: true
  wait: true
  timeout: 15m
  healthChecks:
    - apiVersion: apps/v1
      kind: StatefulSet
      name: chatwoot-postgres
      namespace: fcihome-customer-chat
    - apiVersion: apps/v1
      kind: StatefulSet
      name: chatwoot-redis
      namespace: fcihome-customer-chat
    - apiVersion: apps/v1
      kind: Deployment
      name: chatwoot
      namespace: fcihome-customer-chat
    - apiVersion: apps/v1
      kind: Deployment
      name: feishu-bridge
      namespace: fcihome-customer-chat
